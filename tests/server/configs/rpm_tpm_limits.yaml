# Test config: RPM + TPM dual enforcement with timing scaling.
# 10 requests per 10s AND 500 tokens per 10s.
policies:
  chat:
    strategy: fixed_window
    limits:
      - dimension: requests
        limit: 10
        window_seconds: 10
      - dimension: tokens
        limit: 500
        window_seconds: 10
    scope: api_key
    headers:
      limit: x-ratelimit-limit-requests
      remaining: x-ratelimit-remaining-requests
      reset: x-ratelimit-reset-requests
endpoints:
  /chat/completions:
    methods: [POST]
    policy: chat
    resources:
      requests:
        input:
          strategy: fixed
          value: 1
        output:
          strategy: fixed
          value: 0
      tokens:
        input:
          strategy: characters_div_4
        output:
          strategy: random
          range: [40, 60]
    timing:
      base_ms: [10, 20]
      scale:
        resource: tokens
        component: output
        ms_per_unit: 0.5
